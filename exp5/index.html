<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 5: JS Time & Objects</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; transition: background 0.5s, color 0.5s; }
        #clock { font-size: 5rem; font-weight: bold; margin-bottom: 20px; }
        #date { font-size: 1.5rem; margin-bottom: 40px; }
        .controls { display: flex; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body id="body">
    <div id="clock">00:00:00</div>
    <div id="date">Loading...</div>
    <div class="controls">
        <button id="light-btn">Light Mode</button>
        <button id="dark-btn">Dark Mode</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
