<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 6: jQuery</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f9f9f9; }
        .accordion-item { margin-bottom: 10px; border: 1px solid #ddd; background: #fff; border-radius: 4px; overflow: hidden; }
        .accordion-header { padding: 15px; background: #eee; cursor: pointer; font-weight: bold; }
        .accordion-content { padding: 15px; display: none; }
        .box { width: 100px; height: 100px; background: #007bff; margin-top: 20px; color: white; display: flex; align-items: center; justify-content: center; display: none; }
    </style>
</head>
<body>
    <h1>jQuery Accordion & Effects</h1>

    <div class="accordion">
        <div class="accordion-item">
            <div class="accordion-header">What is jQuery?</div>
            <div class="accordion-content">jQuery is a fast, small, and feature-rich JavaScript library.</div>
        </div>
        <div class="accordion-item">
            <div class="accordion-header">Why use jQuery?</div>
            <div class="accordion-content">It makes things like HTML document traversal and manipulation, event handling, animation, and Ajax much simpler with an easy-to-use API.</div>
        </div>
    </div>

    <button id="show-box" style="margin-top: 20px; padding: 10px;">Show Magic Box</button>
    <div class="box">Hello!</div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            $('.accordion-header').click(function() {
                $(this).next('.accordion-content').slideToggle();
                $('.accordion-content').not($(this).next()).slideUp();
            });

            $('#show-box').click(function() {
                $('.box').fadeIn(1000).delay(1000).fadeOut(1000);
            });
        });
    </script>
</body>
</html>
