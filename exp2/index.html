<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 2: Advanced CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Advanced CSS Layout & Animations</h1>
    </header>
    
    <main>
        <section class="grid-container">
            <div class="box box1">Flexbox Child 1</div>
            <div class="box box2">Flexbox Child 2</div>
            <div class="box box3">Flexbox Child 3</div>
        </section>

        <section class="animation-container">
            <div class="animated-box">Hover Me!</div>
        </section>
        
        <section class="grid-layout">
            <div class="grid-item">Grid Item 1</div>
            <div class="grid-item">Grid Item 2</div>
            <div class="grid-item">Grid Item 3</div>
            <div class="grid-item">Grid Item 4</div>
        </section>
    </main>
</body>
</html>
